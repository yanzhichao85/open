name: Build Tinker Board OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git unzip gawk gettext libssl-dev libelf-dev python3 python3-pip python3-pyelftools

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 -b v23.05.4 https://github.com/immortalwrt/immortalwrt.git
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Tinker Board config
        run: |
          cd immortalwrt
          cat > .config <<EOF
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv7=y
          CONFIG_TARGET_rockchip_armv7_DEVICE_asus_tinkerboard=y
          CONFIG_PACKAGE_luci=y
          EOF
          make defconfig

      - name: Download all packages
        run: |
          cd immortalwrt
          make -j$(nproc) download V=s || make -j1 download V=s

      - name: Build firmware
        run: |
          cd immortalwrt
          make -j$(nproc) V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: openwrt-tinkerboard-firmware
          path: immortalwrt/bin/targets/rockchip/armv7/*.img.gz

      - name: Upload firmware to GitHub Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ github.workspace }}/immortalwrt/bin/targets/rockchip/armv7/*.img.gz
            ${{ github.workspace }}/immortalwrt/bin/targets/rockchip/armv7/*.sysupgrade.bin
          body: |
            自动构建固件
            提交哈希: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
